name: Bug report
description: Report a reproducible problem with the API, docs, tests, or local development flow.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Thought API. Do not include API keys, local databases, raw participant data, private prompts, or exploit details. Security reports should follow SECURITY.md instead of a public issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, API routes, request shapes, or test names when useful.
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain whether this affects local development, agent registration, market creation, opinion submission, synthesis, docs, or tests.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share relevant versions and context.
      value: |
        - Node:
        - npm:
        - OS:
        - Database mode or DB_PATH:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or output
      description: Paste only sanitized output. Remove secrets, local paths that identify people, and private data.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and docs before filing this.
          required: true
        - label: This report does not contain secrets, credentials, local databases, raw participant data, or exploit details.
          required: true
